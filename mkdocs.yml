site_name: legendarr
site_description: Self-hosted subtitle translation companion for Radarr and Sonarr
site_url: https://andersonviudes.github.io/legendarr
repo_url: https://github.com/andersonviudes/legendarr
repo_name: andersonviudes/legendarr
edit_uri: edit/main/docs/

exclude_docs: |
  requirements.txt

theme:
  name: material
  icon:
    logo: material/subtitles-outline
  favicon: material/subtitles-outline
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Configuration:
    - Overview: configuration/index.md
    - Environment Variables Reference: configuration/environment-variables.md
  - Features:
    - Language Profiles: features/language-profiles.md
    - Media Library Sync: features/media-library.md
    - Subtitle Discovery: features/subtitle-discovery.md
    - Subtitle Translation: features/subtitle-translation.md
  - Architecture:
    - Overview: architecture/overview.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/andersonviudes/legendarr
